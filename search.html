<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Search - C's Movies</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    color:white;
    min-height:100vh;

    background:
        radial-gradient(circle at 20% 0%,
            rgba(77,163,255,.20),
            transparent 55%),

        radial-gradient(circle at 80% 10%,
            rgba(60,100,220,.14),
            transparent 60%),

        linear-gradient(
            to bottom,
            #151c2c,
            #111827 35%,
            #090d16 100%
        );

    background-attachment:fixed;
}

.header{

    position:sticky;
    top:0;
    z-index:100;

    display:flex;
    align-items:center;
    gap:30px;

    padding:18px 40px;

    background:rgba(8,12,18,.92);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border-bottom:1px solid rgba(255,255,255,.06);

    box-shadow:
    0 8px 24px rgba(0,0,0,.30),
    0 1px 0 rgba(77,163,255,.08);
}

.header::after{
    content:"";

    position:absolute;

    left:0;
    right:0;
    bottom:-20px;

    height:20px;

    pointer-events:none;

    background:linear-gradient(
        to bottom,
        rgba(0,0,0,.25),
        transparent
    );
}

.logo,
.logo:visited{

    color:white;
    text-decoration:none;

    font-size:28px;
    font-weight:bold;

    display:flex;
    align-items:center;
    gap:10px;

    transition:.2s;

}

.logo:hover{

    color:#8db9ff;
    transform:scale(1.03);

}

.search-box{

    display:flex;
    align-items:center;
    gap:12px;

    width:420px;

    padding:8px 18px;

    border-radius:999px;

    background:#151d2c;

    border:1px solid rgba(255,255,255,.06);
}

.search-box span{

    font-size:20px;
    opacity:.7;
}

.search{

    flex:1;

    background:none;
    border:none;
    outline:none;

    color:white;
    font-size:16px;
}

.search::placeholder{

    color:#7f8aa1;
}

.results-info{
    color:#9f9f9f;
    margin-bottom:24px;
}

.empty{
    color:#9f9f9f;
    font-size:18px;
    margin-top:20px;
}
</style>
</head>

<link rel="icon" type="image/png" href="logo.png">

<body>

<div class="header">
    <div style="display:flex;align-items:center;gap:40px;">

        <a href="index.html" class="logo">C's Movies</a>

        <nav class="nav">
            <a href="index.html">🏠 Home</a>
            <a href="movies.html">🎬 Movies</a>
            <a href="shows.html">📺 Shows</a>
        </nav>

        <div class="search-box">
            <span>🔍</span>
            <input
                id="searchInput"
                class="search"
                type="text"
                placeholder="Search genre, movies, shows...">
        </div>

    </div>
</div>

<div class="container">

    <h1 class="page-title">Search</h1>

    <p id="resultsInfo" class="results-info">
        Type to search your library.
    </p>

    <div class="grid" id="videoGrid"></div>

</div>

<script>
const cached = sessionStorage.getItem("videos");

if (!cached) {
    window.location.href = "index.html";
}

const videos = JSON.parse(cached);

const grid = document.getElementById("videoGrid");
const searchInput = document.getElementById("searchInput");
const resultsInfo = document.getElementById("resultsInfo");

function formatTime(seconds){
    seconds = Math.floor(seconds);

    const hours = Math.floor(seconds / 3600);
    const mins = Math.floor((seconds % 3600) / 60);
    const secs = seconds % 60;

    if (hours > 0) {
        return `${hours}:${mins.toString().padStart(2,"0")}:${secs.toString().padStart(2,"0")}`;
    }

    return `${mins}:${secs.toString().padStart(2,"0")}`;
}

function renderResults(results, query){

    grid.innerHTML = "";

    if (!query.trim()) {
        resultsInfo.textContent = "Type to search your library.";
        return;
    }

    resultsInfo.textContent =
        `${results.length} result${results.length === 1 ? "" : "s"} for "${query}"`;

    if (results.length === 0) {
        grid.innerHTML = `<p class="empty">No results found.</p>`;
        return;
    }

    results.forEach(video => {

        const card = document.createElement("a");

        card.className = "card";
        card.href = `video.html?id=${video.id}`;

        card.innerHTML = `
            <div class="thumb">
                <img src="${video.thumbnail}" alt="${video.title}">

                <div class="duration">
                    ${formatTime(video.duration)}
                </div>
            </div>

            <h3>${video.title}</h3>

            <p>${video.category} • ${video.genre} • ${video.subgenre}</p>
        `;

        grid.appendChild(card);
    });
}

function searchVideos(query){

    query = query.toLowerCase().trim();

    if (!query) {
        renderResults([], "");
        return;
    }

    const results = videos.filter(video => {

        const searchable = [
            video.title,
            video.description,
            video.category,
            video.genre,
            video.subgenre,
            video.date,
            ...(video.tags || [])
        ]
        .join(" ")
        .toLowerCase();

        return searchable.includes(query);
    });

    renderResults(results, query);
}

searchInput.addEventListener("input", () => {
    searchVideos(searchInput.value);
});

const urlQuery = new URLSearchParams(window.location.search).get("q");

if (urlQuery) {
    searchInput.value = urlQuery;
    searchVideos(urlQuery);
}
</script>

</body>
</html>
